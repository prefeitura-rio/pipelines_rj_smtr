version: 2

models:
  - name: view_viagem_climatizacao
    description: "Dados do status dos veículos para o painel de climatização do Subsídio SPPO"
    columns:
      - name: consorcio
        description: "{{ doc('nome_consorcio') }}"
      - name: data
        description: "{{ doc('data_viagem') }}"
      - name: servico
        description: "{{ doc('servico') }}"
      - name: id_validador
        description: "{{ doc('id_validador') }}"
      - name: hora
        description: "{{ doc('hora') }}"
      - name: id_viagem
        description: "{{ doc('id_viagem') }}"
      - name: datetime_partida
        description: "{{ doc('datetime_partida') }}"
      - name: ano_fabricacao
        description: "{{ doc('ano_fabricacao') }}"
      - name: id_veiculo
        description: "{{ doc('id_veiculo') }}"
      - name: indicador_regularidade_temperatura
        description: "Indicador de regularidade da temperatura da viagem"
      - name: operadora
        description: "{{ doc('operadora') }}"
models:
  - name: view_veiculo_operadora
    description: "Monitoramento da distribuição da frota operante do SPPO e subsídio a ações de fiscalização conduzidas pela SMTR"
    columns:
      - name: data
        description: "{{ doc('data') }}"
      - name: id_veiculo
        description: "{{ doc('id_veiculo') }}"
      - name: ano_fabricacao
        description: "{{ doc('ano_fabricacao') }}"
      - name: carroceria
        description: "{{ doc('carroceria') }}"
      - name: indicador_ar_condicionado
        description: "{{ doc('indicador_ar_condicionado') }}"
      - name: nome_chassi
        description: "{{ doc('nome_chassi') }}"
      - name: permissao
        description: "{{ doc('permissao') }}"
      - name: placa
        description: "{{ doc('placa') }}"
      - name: tipo_veiculo
        description: "{{ doc('tipo_veiculo') }}"
      - name: cod_veiculo
        description: " Identificação da empresa operadora obtida através da extração dos três caracteres numéricos após a primeira letra do prefixo do veículo"
      - name: operadora
        description: "{{ doc('operadora') }}"
    tests:
        - dbt_utils.unique_combination_of_columns:
            combination_of_columns:
              - placa
              - operadora
